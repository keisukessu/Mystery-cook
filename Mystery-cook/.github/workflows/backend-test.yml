# .github/workflows/backend-tests.yml
#
# バックエンドのテストを GitHub Actions で自動実行するワークフロー。
# push と pull_request で発火する。

name: Backend Tests

# どのイベントで実行するか
# - push: 全ブランチへのpushで実行（feature/* も main も）
# - pull_request: PR作成・更新時に実行
on:
  push:
  pull_request:

jobs:
  test:
    # GitHub が用意してくれる Ubuntu マシンで実行
    runs-on: ubuntu-latest

    # services でテスト中だけ Postgres コンテナを立ち上げる
    # ローカルの docker-compose の db サービスに相当
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: gacha
          POSTGRES_PASSWORD: gacha_pass
          POSTGRES_DB: mystery_cook_test
        ports:
          - 5432:5432
        # Postgres が起動完了するまで待つためのヘルスチェック
        # これがないとテストが「DBがまだ起きてない」状態で走る
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    # 各ステップを順番に実行
    steps:
      # 1. リポジトリのコードを取得
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Python 3.12 をセットアップ
      # pip キャッシュも有効化して、2回目以降の実行を高速化
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      # 3. 依存パッケージをインストール
      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. pytest を実行
      # 環境変数で TEST_DATABASE_URL を上書きする
      #   - ローカル: db:5432 (Docker compose の db サービス名)
      #   - CI:       localhost:5432 (services の Postgres コンテナを指す)
      - name: Run pytest
        working-directory: backend
        env:
          TEST_DATABASE_URL: postgresql+asyncpg://gacha:gacha_pass@localhost:5432/mystery_cook_test
        run: pytest -v