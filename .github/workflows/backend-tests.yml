# .github/workflows/backend-tests.yml
#
# バックエンドのテストを GitHub Actions で自動実行するワークフロー。
# push と pull_request で発火する。

name: Backend Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    # services でテスト中だけ Postgres コンテナを立ち上げる
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: gacha
          POSTGRES_PASSWORD: gacha_pass
          POSTGRES_DB: mystery_cook_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Python 3.12 をセットアップ
      # cache-dependency-path はリポジトリのルートから見たパス
      # ルートが Mystery-cook/ なので、backend は Mystery-cook/backend/ にある
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: Mystery-cook/backend/requirements.txt

      # 依存パッケージをインストール
      # working-directory もリポジトリのルートから見たパスを指定
      - name: Install dependencies
        working-directory: Mystery-cook/backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # pytest を実行
      # TEST_DATABASE_URL の localhost は GitHub Actions の services を指す
      - name: Run pytest
        working-directory: Mystery-cook/backend
        env:
          TEST_DATABASE_URL: postgresql+asyncpg://gacha:gacha_pass@localhost:5432/mystery_cook_test
        run: pytest -v